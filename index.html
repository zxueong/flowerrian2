<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花語</title>
    <style>
        /* ==========================================================================
           1. 基礎重設與核心佈局 (Reset & Core Layout)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            image-rendering: pixelated;
        }
        
        body {
            background-color: #08080a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace, "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 📱 手機豎屏安全容器（🌟 已修復 Safari 底部按鈕遭網址列遮擋之 Bug） */
        #game-container {
            width: 100%;
            max-width: 430px; 
            height: 100vh;   /* 針對不支援 dvh 的舊版瀏覽器之備用相容方案 */
            height: 100dvh;  /* 核心修正：動態扣除 Safari 動態網址列與導覽列的真實可視高度 */
            max-height: 932px; 
            border: 4px solid #3a3a45;
            background-color: #121216;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
        }

        /* ==========================================================================
           2. 狀態畫面控制 (Screens Switching)
           ========================================================================== */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            background-color: #121216;
            z-index: 1;
        }
        
        .screen.active {
            display: flex;
        }

        /* ==========================================================================
           3. 通用樸素像素大按鈕 (Pixel UI Buttons)
           ========================================================================== */
        .pixel-button {
            width: 100%;
            padding: 16px 20px;
            background-color: #1c1c24;
            border: 3px solid #ffffff;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            text-align: center;
            margin-bottom: 12px;
            outline: none;
            transition: background 0.1s;
        }
        
        .pixel-button:hover:not(:disabled) {
            background-color: #2a2a35;
        }
        
        .pixel-button:active:not(:disabled) {
            background-color: #ffffff;
            color: #121216;
        }
        
        .pixel-button:disabled {
            border-color: #444452;
            color: #444452;
            background-color: #15151c;
            cursor: not-allowed;
        }

        .nav-button {
            padding: 8px 12px;
            background-color: #121216;
            border: 2px solid #ffffff;
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            width: auto;
            align-self: flex-start;
            margin-bottom: 15px;
        }

        /* ==========================================================================
           4. 讀取中畫面 (Loading Screen)
           ========================================================================== */
        #loading-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            z-index: 10;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 4px solid #3a3a45;
            border-top: 4px solid #ffffff;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ==========================================================================
           5. 遊戲主畫面 (Main Menu Screen)
           ========================================================================== */
        #main-menu-screen {
            justify-content: space-between;
            align-items: center;
            padding: 60px 30px;
            background: linear-gradient(180deg, #121216 0%, #1a1a24 100%);
        }
        
        .game-title-area {
            text-align: center;
            margin-top: 40px;
        }
        
        .game-title {
            font-size: 36px;
            font-weight: bold;
            color: #ffde59;
            line-height: 1.2;
            letter-spacing: 2px;
        }
        
        .game-subtitle {
            font-size: 14px;
            color: #8a8a9e;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        
        .menu-buttons {
            width: 100%;
            margin-bottom: 60px;
        }

        /* ==========================================================================
           6. 成就圖鑑介面
           ========================================================================== */
        .menu-layout {
            padding: 24px;
        }
        
        .screen-title {
            font-size: 24px;
            font-weight: bold;
            color: #ffde59;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px dashed #3a3a45;
            padding-bottom: 10px;
        }
        
        .list-scroll-view {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 4px;
        }
        
        .list-scroll-view::-webkit-scrollbar { width: 6px; }
        .list-scroll-view::-webkit-scrollbar-track { background: #15151c; }
        .list-scroll-view::-webkit-scrollbar-thumb { background: #3a3a45; }

        .achievement-card {
            border: 2px solid #3a3a45;
            background-color: #15151c;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .achievement-card.unlocked {
            border-color: #ffffff;
            background-color: #1c1c24;
        }
        
        .ach-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .ach-title {
            font-size: 16px;
            font-weight: bold;
            color: #8a8a9e;
        }
        
        .achievement-card.unlocked .ach-title {
            color: #ffde59;
        }
        
        .ach-status {
            font-size: 11px;
            padding: 2px 6px;
            border: 1px solid #444452;
            color: #444452;
        }
        
        .achievement-card.unlocked .ach-status {
            border-color: #ffde59;
            color: #ffde59;
        }
        
        .ach-desc {
            font-size: 13px;
            color: #444452;
            line-height: 1.4;
        }
        
        .achievement-card.unlocked .ach-desc {
            color: #d1d1e0;
        }

        /* ==========================================================================
           7. 核心遊戲遊玩畫面 (Gameplay Screen)
           ========================================================================== */
        #game-screen {
            padding: 0;
            justify-content: flex-start;
        }

        #stage-area {
            width: 100%;
            height: 48%; 
            background-color: #1a1a24;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 16px;
            border-bottom: 4px solid #3a3a45;
        }

        .character-sprite {
            width: auto;
            height: 85%; 
            max-width: 48%;
            object-fit: contain;
            transition: opacity 0.2s;
            z-index: 2;
        }
        
        .game-menu-trigger {
            position: absolute;
            top: 16px;
            left: 16px;
            margin: 0;
            z-index: 5;
            background-color: rgba(18, 18, 22, 0.8);
        }

        #ui-area {
            flex: 1;
            background-color: #08080a;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 12px;
        }

        #dialog-box {
            border: 3px solid #ffffff;
            background-color: #121216;
            padding: 14px;
            min-height: 110px;
            flex-shrink: 0;
        }
        
        #speaker-name {
            font-size: 16px;
            font-weight: bold;
            color: #ffde59;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        
        #dialog-text {
            font-size: 15px;
            line-height: 1.6;
            color: #ffffff;
            word-break: break-all;
        }
        
        #dialog-text::after {
            content: ' █';
            animation: cursorBlink 0.8s infinite;
        }
        @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #options-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            margin-top: auto;
        }
        
        #options-container .pixel-button {
            margin-bottom: 10px;
        }
        #options-container .pixel-button:last-child {
            margin-bottom: 0;
        }

        /* ==========================================================================
           ✨ 質感升級版：半透明、含詳細說明的成就彈出通知
           ========================================================================== */
        #achievement-toast {
            position: absolute;
            top: -120px; /* 預設藏在畫面上方 */
            left: 5%;
            width: 90%;
            background-color: rgba(28, 28, 36, 0.85); /* 核心：調低底色透明度到 85% */
            backdrop-filter: blur(4px); /* 讓後方舞台畫面微微模糊 */
            border: 3px solid rgba(255, 222, 89, 0.9); /* 邊框微透明像素感 */
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            z-index: 999; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 經典像素回彈特效 */
        }

        #achievement-toast.show {
            top: 20px; /* 彈下來的位置 */
        }

        .toast-header {
            font-size: 11px; 
            color: #ffde59;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .toast-title {
            font-size: 15px;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .toast-desc {
            font-size: 11px; 
            color: #b2b2c2; 
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="achievement-toast">
            <div class="toast-header">🏆 獲得成就！</div>
            <div class="toast-title" id="toast-title-text">成就名稱</div>
            <div class="toast-desc" id="toast-desc-text">這裡會顯示成就的詳細描述內容...</div>
        </div>
        
        <div id="loading-screen" class="screen active">
            <div class="spinner"></div>
            <h3>正在連接...</h3>
        </div>

        <div id="main-menu-screen" class="screen">
            <div class="game-title-area">
                <div class="game-title">花語</div>
                <div class="game-subtitle">あなたの側に居たかっただけ構造なのに</div>
            </div>
            
            <div class="menu-buttons">
                <button class="pixel-button" onclick="uiStartNewGame()">新 游 戲</button>
                <button class="pixel-button" id="continue-btn" onclick="uiContinueGame()" disabled>繼 續 遊 戲</button>
                <button class="pixel-button" onclick="uiOpenAchievements()">成 就 圖 鑑</button>
            </div>
        </div>

        <div id="ach-screen" class="screen menu-layout">
            <button class="nav-button" onclick="switchScreen('main-menu-screen')">◀ 返回主選單</button>
            <div class="screen-title">成 就 圖 鑑</div>
            <div class="list-scroll-view" id="ach-list">
                </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="stage-area">
                <button class="nav-button game-menu-trigger" onclick="uiBackToMenuFromGame()">◀ 選單</button>
                <img id="char-left" class="character-sprite" src="" alt="">
                <img id="char-right" class="character-sprite" src="" alt="">
            </div>
            
            <div id="ui-area">
                <div id="dialog-box">
                    <div id="speaker-name">載入中</div>
                    <div id="dialog-text">正在讀取文字內容...</div>
                </div>
                
                <div id="options-container">
                    </div>
            </div>
        </div>

    </div>

    <script>
        // 【已保留您專屬的 Google 試算表唯一識別 ID】
        const SPREADSHEET_ID = '1zamjGcBczRM7aKVOoUVaRCtiBI506Ht5F8SLIU4_pwA'; 
        
        const BASE_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

        let scriptData = {};    
        let achData = [];       
        let achMap = {}; 
        
        let typeWriterTimeout = null;

        window.addEventListener('DOMContentLoaded', () => {
            loadGameDatabase();
        });

        async function loadGameDatabase() {
            try {
                // 1. 抓取劇情 Script
                const resScript = await fetch(`${BASE_URL}&sheet=Script`);
                const textScript = await resScript.text();
                parseScriptTable(textScript);

                // 2. 抓取成就 Achievements
                try {
                    const resAch = await fetch(`${BASE_URL}&sheet=Achievements`);
                    const textAch = await resAch.text();
                    parseAchievementTable(textAch);
                } catch(e) {
                    console.warn("未檢測到自定義成就分頁，啟用預設備用模擬數據。");
                    generateFallbackAchievements();
                }

                checkLocalStorageSaveState();
                switchScreen('main-menu-screen');

            } catch (error) {
                alert('【系統出錯】無法成功獲取雲端資料。請仔細核對您的 SPREADSHEET_ID 是否正確，且該試算表是否已開啟「發布到網路」。');
                console.error(error);
            }
        }

        function cleanGoogleJson(rawText) {
            const startIdx = rawText.indexOf('{');
            const endIdx = rawText.lastIndexOf('}');
            return JSON.parse(rawText.substring(startIdx, endIdx + 1));
        }

        function parseScriptTable(rawText) {
            const jsonObj = cleanGoogleJson(rawText);
            const rows = jsonObj.table.rows;
            
            rows.forEach((row, index) => {
                if (index === 0) return; 
                
                const id = row.c[0]?.v?.toString().trim();
                if (id) {
                    scriptData[id] = {
                        id: id,
                        name: row.c[1]?.v || '',
                        text: row.c[2]?.v || '',
                        bg: row.c[3]?.v || '',
                        charLeft: row.c[4]?.v || '',
                        charRight: row.c[5]?.v || '',
                        optAText: row.c[6]?.v || '',
                        optATarget: row.c[7]?.v?.toString().trim() || '',
                        optBText: row.c[8]?.v || '',
                        optBTarget: row.c[9]?.v?.toString().trim() || '',
                        triggerAch: row.c[10]?.v?.toString().trim() || ''
                    };
                }
            });
        }

        function parseAchievementTable(rawText) {
            const jsonObj = cleanGoogleJson(rawText);
            const rows = jsonObj.table.rows;
            achData = [];
            achMap = {};
            
            rows.forEach((row, index) => {
                if (index === 0) return;
                const achId = row.c[0]?.v?.toString().trim();
                if (achId) {
                    const item = {
                        id: achId,
                        title: row.c[1]?.v || '未知成就',
                        desc: row.c[2]?.v || '無描述內容。'
                    };
                    achData.push(item);
                    achMap[achId] = item; 
                }
            });
            if(achData.length === 0) generateFallbackAchievements();
        }

        function generateFallbackAchievements() {
            achData = [
                { id: 'ACH_01', title: '踏出第一步', desc: '成功解鎖第一個主線選項動作。' },
                { id: 'ACH_02', title: '黑夜降臨', desc: '因為猶豫不決而被吞噬在無盡的黑暗之中。' }
            ];
            achData.forEach(a => achMap[a.id] = a);
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function checkLocalStorageSaveState() {
            const localSaveSlot = localStorage.getItem('pixel_adventure_save_slot');
            const continueBtn = document.getElementById('continue-btn');
            if (localSaveSlot && scriptData[localSaveSlot]) {
                continueBtn.disabled = false;
            } else {
                continueBtn.disabled = true;
            }
        }

        function uiStartNewGame() {
            switchScreen('game-screen');
            playSceneEngine('001'); 
        }

        function uiContinueGame() {
            const localSaveSlot = localStorage.getItem('pixel_adventure_save_slot');
            switchScreen('game-screen');
            playSceneEngine(localSaveSlot);
        }

        function uiOpenAchievements() {
            const container = document.getElementById('ach-list');
            container.innerHTML = '';
            
            achData.forEach(ach => {
                const isUnlocked = localStorage.getItem(`ach_status_${ach.id}`) === 'unlocked';
                const card = document.createElement('div');
                card.className = `achievement-card ${isUnlocked ? 'unlocked' : ''}`;
                
                card.innerHTML = `
                    <div class="ach-header">
                        <span class="ach-title">${isUnlocked ? ach.title : '【 隱藏成就 】'}</span>
                        <span class="ach-status">${isUnlocked ? '已達成' : '未解鎖'}</span>
                    </div>
                    <div class="ach-desc">${isUnlocked ? ach.desc : '繼續推進故事以解鎖隱藏的特殊成就。'}</div>
                `;
                container.appendChild(card);
            });
            switchScreen('ach-screen');
        }

        function uiBackToMenuFromGame() {
            checkLocalStorageSaveState();
            switchScreen('main-menu-screen');
        }

        /* 整合顯示標題與詳細描述的彈窗系統 */
        function triggerAchievementToast(achId) {
            const achObj = achMap[achId];
            const titleText = achObj ? achObj.title : achId;
            const descText = achObj ? achObj.desc : '恭喜解鎖隱藏成就！';
            
            const toast = document.getElementById('achievement-toast');
            
            document.getElementById('toast-title-text').innerText = titleText;
            document.getElementById('toast-desc-text').innerText = descText;
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        /* ==========================================================================
           核心劇情文本播放與指令控制引擎
           ========================================================================== */
        function playSceneEngine(sceneId) {
            const scene = scriptData[sceneId];
            if (!scene) {
                alert(`【核心引擎警告】無法從試算表資料中索引到 ID: [${sceneId}] 的劇情列。`);
                uiBackToMenuFromGame();
                return;
            }

            localStorage.setItem('pixel_adventure_save_slot', sceneId);

            if (scene.triggerAch && scene.triggerAch.length > 0) {
                const achId = scene.triggerAch;
                if(localStorage.getItem(`ach_status_${achId}`) !== 'unlocked') {
                    localStorage.setItem(`ach_status_${achId}`, 'unlocked');
                    triggerAchievementToast(achId);
                }
            }

            const stage = document.getElementById('stage-area');
            stage.style.backgroundImage = scene.bg ? `url(${scene.bg})` : 'none';

            const imgLeft = document.getElementById('char-left');
            if (scene.charLeft && scene.charLeft.trim() !== '') {
                imgLeft.src = scene.charLeft;
                imgLeft.style.opacity = '1';
            } else {
                imgLeft.style.opacity = '0';
            }

            const imgRight = document.getElementById('char-right');
            if (scene.charRight && scene.charRight.trim() !== '') {
                imgRight.src = scene.charRight;
                imgRight.style.opacity = '1';
            } else {
                imgRight.style.opacity = '0';
            }

            document.getElementById('speaker-name').innerText = scene.name ? scene.name : '（系統提示）';

            runTypeWriterAnimation(scene.text);

            const optionsBox = document.getElementById('options-container');
            optionsBox.innerHTML = '';

            if (scene.optAText && scene.optAText.trim() !== '') {
                appendFullWidthOption(scene.optAText, scene.optATarget);
            }
            
            if (scene.optBText && scene.optBText.trim() !== '') {
                appendFullWidthOption(scene.optBText, scene.optBTarget);
            }

            if (optionsBox.children.length === 0) {
                appendFullWidthOption("故事暫時告一段落（點擊返回主畫面）", "MENU_BACK");
            }
        }

        function runTypeWriterAnimation(textStr) {
            clearTimeout(typeWriterTimeout);
            const dialogTextElement = document.getElementById('dialog-text');
            dialogTextElement.innerText = '';
            
            let charIndex = 0;
            function step() {
                if (charIndex < textStr.length) {
                    dialogTextElement.innerText += textStr.charAt(charIndex);
                    charIndex++;
                    typeWriterTimeout = setTimeout(step, 40); 
                }
            }
            step();
        }

        function appendFullWidthOption(buttonText, targetSceneId) {
            const btn = document.createElement('button');
            btn.className = 'pixel-button';
            btn.innerText = buttonText;
            
            btn.onclick = () => {
                if (targetSceneId === "MENU_BACK" || !targetSceneId || targetSceneId.trim() === "") {
                    uiBackToMenuFromGame();
                } else {
                    playSceneEngine(targetSceneId);
                }
            };
            
            document.getElementById('options-container').appendChild(btn);
        }
    </script>
</body>
</html>
